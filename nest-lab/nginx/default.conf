# =========================================================================
# NGINX reverse-proxy config — container-internal
# -------------------------------------------------------------------------
# Routes:
#   /                → friendly landing page
#   /api/            → NestJS container (service name: app, port 3000)
# =========================================================================

server {
    listen 80;
    server_name _;

    # --- Reasonable request body limit for image uploads ----------------
    client_max_body_size 10m;

    # --- /api/ → NestJS app container -----------------------------------
    # "app" is the docker-compose service name — Docker's internal DNS
    # resolves it to the NestJS container IP on the shared network.
    location /api/ {
        proxy_pass         http://app:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";

        proxy_connect_timeout 30s;
        proxy_read_timeout    60s;
    }

    # --- Root landing page ---------------------------------------------
    location = / {
        return 200 'ICT Hotel Booking API — try /api/health or /api/docs\n';
        add_header Content-Type text/plain;
    }
}
