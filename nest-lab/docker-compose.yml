services:
  mysql:
    image: mysql:8.0
    container_name: icthotel-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ICTHotel
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotelpass
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: icthotel-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - app-network

  app:
    build: . # This tells Docker to use the Dockerfile we made inside the nest-lab folder
    container_name: nest-app-prod
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://hoteluser:hotelpass@mysql:3306/ICTHotel"
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    # This healthcheck proves to Docker that your app is alive!
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge