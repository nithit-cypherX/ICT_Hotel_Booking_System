services:
  nginx:
    image: nginx:alpine
    container_name: icthotel-nginx
    ports:
      - "80:80"                    # NGINX is the only public door
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: icthotel-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ICTHotel
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotelpass
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: icthotel-redis
    expose:
      - "6379"                     # internal only
    restart: always
    networks:
      - app-network

  app:
    build: .
    container_name: nest-app-prod
    expose:
      - "3000"                     # internal only — NGINX reaches it, world cannot
    environment:
      DATABASE_URL: "mysql://hoteluser:hotelpass@mysql:3306/ICTHotel"
      NODE_ENV: production
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge