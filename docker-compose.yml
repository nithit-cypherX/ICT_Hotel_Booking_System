services:
  mysql:
    image: mysql:8.0
    container_name: icthotel-mysql
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: ICTHotel
      MYSQL_USER: hoteluser
      MYSQL_PASSWORD: hotelpass
    ports:
      - "3310:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - app-network

  redis:
    image: redis:alpine
    container_name: icthotel-redis
    ports:
      - "6379:6379"
    restart: always
    networks:
      - app-network

  app:
    image: node:24
    container_name: nest-app
    user: "1000:1000"
    working_dir: /app/nest-lab
    volumes:
      - .:/app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "mysql://hoteluser:hotelpass@mysql:3306/ICTHotel"
      PRISMA_SCHEMA_DISABLE_ADVISORY_LOCK: "1"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"  
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - app-network
    command: sleep infinity

volumes:
  mysql_data:

networks:
  app-network:
    driver: bridge